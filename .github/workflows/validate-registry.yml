name: Validate registry

on:
  pull_request:
    paths:
      - registry.json
      - nifti-registry.schema.json
      - tools/validate_registry.py
      - tools/check_registry_immutable.py
      - .github/workflows/validate-registry.yml
  push:
    branches: [ main ]
    paths:
      - registry.json
      - nifti-registry.schema.json
      - tools/validate_registry.py
      - tools/check_registry_immutable.py
      - .github/workflows/validate-registry.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python tools/validate_registry.py

      - name: Fetch main for immutability check
        if: github.event_name == 'pull_request'
        run: git fetch origin main --depth=1

      - name: Check registry immutability
        if: github.event_name == 'pull_request'
        run: python tools/check_registry_immutable.py
